openapi: 3.1.0
info:
  title: Nexora POS API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:8787
paths:
  /health/ready:
    get:
      responses:
        "200":
          description: API and database are ready
  /api/v1/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200": { description: Authenticated session }
        "401": { description: Invalid credentials }
  /api/v1/catalog/products:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Tenant-scoped product catalog }
  /api/v1/orders:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Tenant-scoped orders }
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      responses:
        "201": { description: Order created }
        "200": { description: Existing idempotent result }
  /api/v1/sync/push:
    post:
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Accepted, duplicate, conflicted, and rejected event results }
  /api/v1/sync/pull:
    get:
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: cursor
          schema: { type: integer, minimum: 0 }
      responses:
        "200": { description: Ordered event page and next cursor }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
